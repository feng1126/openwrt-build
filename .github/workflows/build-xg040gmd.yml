name: Build XG-040G-MD OpenWrt

on:
  workflow_dispatch:
    inputs:
      pr_id:
        description: "OpenWrt PR ID to merge"
        required: true
        default: "23569"
      base_branch:
        description: "OpenWrt base branch"
        required: true
        default: "main"
      config_seed:
        description: "Minimal .config seed"
        required: false
        default: |
          CONFIG_TARGET_airoha=y
          CONFIG_TARGET_airoha_an7581=y
          CONFIG_TARGET_airoha_an7581_DEVICE_nokia_xg-040g-md=y

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          sudo docker system prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-setuptools rsync swig \
            unzip zlib1g-dev file wget ccache python3 python3-dev

      - name: Clone OpenWrt and merge PR
        run: |
          git clone https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git fetch origin "${{ github.event.inputs.base_branch }}"
          git fetch origin "pull/${{ github.event.inputs.pr_id }}/head:pr-${{ github.event.inputs.pr_id }}"
          git checkout -B "xg040gmd-build" "origin/${{ github.event.inputs.base_branch }}"
          git merge --no-ff --no-edit "pr-${{ github.event.inputs.pr_id }}"
          git log --oneline -5

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate config
        run: |
          cd openwrt
          cat > .config <<'EOF'
          ${{ github.event.inputs.config_seed }}
          EOF
          sed -i 's/^[[:space:]]*//' .config
          make defconfig
          echo "===== target profile check ====="
          grep -E 'CONFIG_TARGET_airoha|CONFIG_TARGET.*xg|CONFIG_TARGET.*nokia|CONFIG_TARGET.*040' .config || true

      - name: Download sources
        run: |
          cd openwrt
          make download -j"$(nproc)" V=s

      - name: Build firmware
        run: |
          cd openwrt
          make -j"$(nproc)" V=s

      - name: Collect firmware
        if: always()
        run: |
          mkdir -p artifact
          if [ -d openwrt/bin/targets ]; then
            cp -a openwrt/bin/targets artifact/targets
          fi
          if [ -f openwrt/.config ]; then
            cp openwrt/.config artifact/openwrt.config
          fi
          find artifact -maxdepth 5 -type f | sort

      - name: Upload firmware artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xg040gmd-openwrt-pr-${{ github.event.inputs.pr_id }}
          path: artifact
          retention-days: 14
