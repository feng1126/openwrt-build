name: Build XG-040G-MD OpenWrt

on:
  workflow_dispatch:
    inputs:
      base_branch:
        description: "OpenWrt official branch to build"
        required: true
        default: "main"
      config_seed:
        description: "OpenWrt .config seed"
        required: false
        default: |
          CONFIG_TARGET_airoha=y
          CONFIG_TARGET_airoha_an7581=y
          CONFIG_TARGET_airoha_an7581_DEVICE_nokia_xg-040g-md-ubi=y
          CONFIG_PACKAGE_luci=y
          CONFIG_PACKAGE_luci-ssl=y
          CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-firewall-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-package-manager-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-smartdns-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-zerotier-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-mosquitto-zh-cn=y
          CONFIG_PACKAGE_luci-i18n-socat-zh-cn=y
          CONFIG_PACKAGE_luci-app-firewall=y
          CONFIG_PACKAGE_luci-app-package-manager=y
          CONFIG_PACKAGE_luci-app-ttyd=y
          CONFIG_PACKAGE_luci-app-ddns=y
          CONFIG_PACKAGE_luci-app-smartdns=y
          CONFIG_PACKAGE_luci-app-zerotier=y
          CONFIG_PACKAGE_luci-app-mosquitto=y
          CONFIG_PACKAGE_luci-app-socat=y
          CONFIG_PACKAGE_luci-proto-ipv6=y
          CONFIG_PACKAGE_luci-proto-ppp=y
          CONFIG_PACKAGE_luci-theme-bootstrap=y
          CONFIG_PACKAGE_luci-theme-argon=y
          CONFIG_PACKAGE_luci-app-wechatpush=y
          CONFIG_PACKAGE_luci-i18n-wechatpush-zh-cn=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
          CONFIG_PACKAGE_luci-app-passwall_Nftables_Transparent_Proxy=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Geoview=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Haproxy=y
          # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Shadowsocks_Rust_Client is not set
          # CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Shadowsocks_Rust_Server is not set
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Simple_Obfs=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_SingBox=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_V2ray_Plugin=y
          CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Xray=y
          CONFIG_PACKAGE_uhttpd=y
          CONFIG_PACKAGE_uhttpd-mod-ubus=y
          CONFIG_PACKAGE_openssl-util=y
          CONFIG_PACKAGE_ca-bundle=y
          CONFIG_PACKAGE_ca-certificates=y
          CONFIG_PACKAGE_ddns-scripts=y
          CONFIG_PACKAGE_ddns-scripts-services=y
          CONFIG_PACKAGE_bind-host=y
          CONFIG_PACKAGE_bind-dig=y
          CONFIG_PACKAGE_resolveip=y
          CONFIG_PACKAGE_ip-full=y
          CONFIG_PACKAGE_jq=y
          CONFIG_PACKAGE_jsonfilter=y
          CONFIG_PACKAGE_bash=y
          CONFIG_PACKAGE_iputils-arping=y
          CONFIG_PACKAGE_luci-compat=y
          CONFIG_PACKAGE_luci-lib-jsonc=y
          CONFIG_PACKAGE_luci-lua-runtime=y
          CONFIG_PACKAGE_coreutils=y
          CONFIG_PACKAGE_coreutils-base64=y
          CONFIG_PACKAGE_coreutils-nohup=y
          CONFIG_PACKAGE_coreutils-timeout=y
          CONFIG_PACKAGE_libuci-lua=y
          CONFIG_PACKAGE_lua=y
          CONFIG_PACKAGE_lua-cjson=y
          CONFIG_PACKAGE_lyaml=y
          CONFIG_PACKAGE_dnsmasq-full=y
          CONFIG_PACKAGE_chinadns-ng=y
          CONFIG_PACKAGE_dns2socks=y
          CONFIG_PACKAGE_microsocks=y
          CONFIG_PACKAGE_ipt2socks=y
          CONFIG_PACKAGE_tcping=y
          CONFIG_PACKAGE_haproxy=y
          CONFIG_PACKAGE_geoview=y
          CONFIG_PACKAGE_sing-box=y
          CONFIG_PACKAGE_xray-core=y
          CONFIG_PACKAGE_simple-obfs-client=y
          CONFIG_PACKAGE_v2ray-plugin=y
          CONFIG_PACKAGE_iptables-nft=y
          CONFIG_PACKAGE_ip6tables-nft=y
          CONFIG_PACKAGE_kmod-nf-socket=y
          CONFIG_PACKAGE_kmod-nf-tproxy=y
          CONFIG_PACKAGE_kmod-nft-core=y
          CONFIG_PACKAGE_kmod-nft-fib=y
          CONFIG_PACKAGE_kmod-nft-socket=y
          CONFIG_PACKAGE_kmod-nft-tproxy=y
          CONFIG_PACKAGE_kmod-nft-nat=y
          CONFIG_PACKAGE_kmod-nft-offload=y
          CONFIG_PACKAGE_kmod-inet-diag=y
          CONFIG_PACKAGE_kmod-netlink-diag=y
          CONFIG_PACKAGE_kmod-tun=y
          CONFIG_PACKAGE_nftables-json=y
          CONFIG_PACKAGE_xtables-nft=y
          CONFIG_PACKAGE_smartdns=y
          CONFIG_PACKAGE_ttyd=y
          CONFIG_PACKAGE_zerotier=y
          CONFIG_PACKAGE_mosquitto-ssl=y
          CONFIG_PACKAGE_socat=y
          CONFIG_PACKAGE_curl=y
          CONFIG_PACKAGE_wget-ssl=y
          CONFIG_PACKAGE_nano=y
          CONFIG_PACKAGE_htop=y
          CONFIG_PACKAGE_iperf3=y
          CONFIG_PACKAGE_tcpdump=y
          CONFIG_PACKAGE_block-mount=y
          CONFIG_PACKAGE_kmod-usb-storage=y
          CONFIG_PACKAGE_e2fsprogs=y
          CONFIG_PACKAGE_lsblk=y

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          sudo docker system prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses-dev libssl-dev python3-setuptools rsync swig \
            unzip zlib1g-dev file wget ccache python3 python3-dev

      - name: Clone official OpenWrt snapshot source
        run: |
          git clone --branch "${{ github.event.inputs.base_branch }}" https://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git log --oneline -5

      - name: Copy local custom packages
        run: |
          cd openwrt
          mkdir -p package/custom
          cp -a ../local_packages/luci-theme-argon package/custom/luci-theme-argon
          cp -a ../local_packages/luci-app-wechatpush package/custom/luci-app-wechatpush
          cp -a ../local_packages/openwrt-passwall/luci-app-passwall package/custom/luci-app-passwall
          cp -a ../local_packages/openwrt-passwall-packages/. package/custom/
          echo "===== local custom packages ====="
          find package/custom -maxdepth 2 -name Makefile | sort

      - name: Update feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate config
        run: |
          cd openwrt
          cat > .config <<'EOF'
          ${{ github.event.inputs.config_seed }}
          EOF
          sed -i 's/^[[:space:]]*//' .config
          make defconfig
          echo "===== target profile check ====="
          grep -E 'CONFIG_TARGET_airoha|CONFIG_TARGET.*xg|CONFIG_TARGET.*nokia|CONFIG_TARGET.*040' .config || true
          echo "===== luci/package check ====="
          grep -E 'CONFIG_PACKAGE_luci|CONFIG_PACKAGE_smartdns|CONFIG_PACKAGE_ttyd|CONFIG_PACKAGE_zerotier|CONFIG_PACKAGE_ddns|CONFIG_PACKAGE_bind|CONFIG_PACKAGE_resolveip|CONFIG_PACKAGE_ip-full|CONFIG_PACKAGE_jq|CONFIG_PACKAGE_jsonfilter|CONFIG_PACKAGE_mosquitto|CONFIG_PACKAGE_socat|CONFIG_PACKAGE_.*argon|CONFIG_PACKAGE_.*wechatpush|CONFIG_PACKAGE_.*passwall|CONFIG_PACKAGE_.*sing-box|CONFIG_PACKAGE_.*xray|CONFIG_PACKAGE_.*shadowsocks|CONFIG_PACKAGE_.*haproxy' .config || true

      - name: Download sources
        run: |
          cd openwrt
          make download -j"$(nproc)" V=s

      - name: Build firmware
        run: |
          cd openwrt
          make -j"$(nproc)" V=s

      - name: Collect firmware
        if: always()
        run: |
          mkdir -p artifact
          if [ -d openwrt/bin/targets ]; then
            cp -a openwrt/bin/targets artifact/targets
          fi
          if [ -f openwrt/.config ]; then
            cp openwrt/.config artifact/openwrt.config
          fi
          find artifact -maxdepth 5 -type f | sort

      - name: Upload firmware artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xg040gmd-openwrt-${{ github.event.inputs.base_branch }}
          path: artifact
          retention-days: 14
